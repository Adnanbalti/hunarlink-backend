spring:
  application:
    name: hunarlink-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/hunarlink
    username: hunarlink_user
    password: hunarlink_pass
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: disable
      password: disable

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: hunarlink-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000