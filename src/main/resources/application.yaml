spring:
  application:
    name: hunarlink-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/hunarlink
    username: hunarlink_user
    password: hunarlink_pass
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: disable
      password: disable

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info