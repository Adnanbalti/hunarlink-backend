version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: hunarlink-db
    environment:
      POSTGRES_DB: hunarlink
      POSTGRES_USER: hunarlink_user
      POSTGRES_PASSWORD: hunarlink_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hunarlink-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: